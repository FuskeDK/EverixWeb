<!doctype html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Everix</title>
<meta name="description" content="Admin panel for Everix ansøgninger.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<a class="skip-link" href="#hovedindhold">Spring til indhold</a>

<header class="site-header" id="site-header">
  <div class="wrap header-inner">
    <a href="/" class="brand">
      <span class="brand-name">Everix</span>
    </a>
    <nav class="main-nav" aria-label="Admin navigation">
      <button type="button" class="admin-nav-btn is-active" data-admin-tab="ansogninger">Ansøgninger</button>
      <button type="button" class="admin-nav-btn" data-admin-tab="regler">Regler</button>
    </nav>
  </div>
</header>

<main id="hovedindhold">

  <section class="page-hero">
    <div class="wrap">
      <p class="eyebrow">Admin</p>
      <h1 class="page-title" id="adminPageTitle">Ansøgninger</h1>
    </div>
  </section>

  <!-- LOGIN GATE -->
  <section class="section apply-section" id="adminLoginGate" hidden>
    <div class="wrap apply-wrap apply-gate">
      <p class="apply-gate-text">Log ind med den autoriserede Google-konto for at se og behandle ansøgninger.</p>
      <a href="/api/google-login" class="btn btn-primary btn-large">Log ind med Google</a>
    </div>
  </section>

  <!-- DENIED -->
  <section class="section apply-section" id="adminDenied" hidden>
    <div class="wrap apply-wrap apply-gate">
      <p class="apply-gate-text">Denne konto har ikke adgang til admin-panelet.</p>
      <a href="/api/google-login" class="btn btn-outline btn-large">Prøv en anden konto</a>
    </div>
  </section>

  <!-- ANSØGNINGER TAB -->
  <section class="section" id="adminTabAnsogninger">
    <div class="wrap">
      <div class="apply-user-bar">
        <span>Logget ind som admin</span>
        <a href="/api/logout">Log ud</a>
      </div>

      <div class="admin-filters" id="adminFilters">
        <button type="button" class="admin-filter-btn is-active" data-filter="Alle">Alle</button>
        <button type="button" class="admin-filter-btn" data-filter="Allowlist">Allowlist</button>
        <button type="button" class="admin-filter-btn" data-filter="Politi">Politi</button>
        <button type="button" class="admin-filter-btn" data-filter="EMS">EMS</button>
        <button type="button" class="admin-filter-btn" data-filter="Firma">Firma</button>
        <button type="button" class="admin-filter-btn" data-filter="Bande">Bande</button>
      </div>

      <div class="admin-filters">
        <button type="button" class="admin-filter-btn staff-tab-btn is-active" data-tab="aktive">Aktive</button>
        <button type="button" class="admin-filter-btn staff-tab-btn" data-tab="historik">Historik</button>
      </div>

      <div id="adminTabAktive">
        <div id="adminActiveList" class="admin-list"></div>
      </div>
      <div id="adminTabHistorik" hidden>
        <input type="text" id="adminSearch" class="staff-search" placeholder="Søg efter Discord brugernavn...">
        <div id="adminHistoryList" class="admin-list"></div>
      </div>
    </div>
  </section>

  <!-- REGLER TAB -->
  <section class="section" id="adminTabRegler" hidden>
    <div class="wrap">
      <div id="rulesGroups"></div>

      <div class="form-panel" id="addGroupPanel">
        <p class="form-panel-label">Tilføj ny regelgruppe</p>
        <div class="form-panel-grid">
          <label class="field field-compact">
            <span>Navn</span>
            <input type="text" id="newGroupName" placeholder="F.eks. Køretøjer">
          </label>
          <label class="field field-compact">
            <span>Bogstav (valgfrit)</span>
            <input type="text" id="newGroupCode" maxlength="1" placeholder="F.eks. K">
          </label>
        </div>
        <button type="button" class="btn btn-primary btn-small" id="addGroupBtn">Tilføj gruppe</button>
      </div>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="wrap footer-bottom">
    <span>© 2026 Everix Roleplay</span>
  </div>
</footer>

<script type="module" src="js/main.js"></script>
<script type="module" src="js/admin.js"></script>
</body>
</html>
